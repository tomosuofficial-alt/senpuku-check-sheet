<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0a1628" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="千福ワーク" />
<link rel="apple-touch-icon" href="favicon.png" />
<link rel="icon" href="favicon.png" />
<title>よいどころ千福 ワークアプリ</title>
<style>
/* =========================================================
   よいどころ千福 統合ワークアプリ — 単一ファイルPWA（モック層）
   デザイン: エディトリアル・ミニマル / 余白で語る / 色は点で使う /
            タイポは極端な対比 / ヒーローだけ強調 / 絵文字禁止・自作モノクロ線画アイコン
   ========================================================= */
:root{
  --navy-900:#0a1628; --navy-800:#0d2847; --navy-700:#16385f;
  --gold:#c3a569; --gold-soft:#d9c290; --red-dot:#c30d23;
  --red:#c0392b; --orange:#b96b00; --green:#1f7a43; --blue:#0a5cd8;
  --bg:#faf8f4; --card:#ffffff; --card-2:#f3efe6;
  --ink:#14161c; --ink-2:#5b5d66; --ink-3:#9a9ba3; --line:#ece5d8;
  --ease:cubic-bezier(.16,1,.3,1);
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  --tab-h:62px; --header-h:52px;
  --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Segoe UI",sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0a1628; --card:#0f1e33; --card-2:#122540;
    --ink:#f2efe6; --ink-2:#b9c2cf; --ink-3:#6e7c92; --line:rgba(255,255,255,.08);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
.hidden{display:none!important}
.muted{color:var(--ink-3)}

/* アイコン共通(モノクロ・currentColor追従) */
.ic{display:inline-block;vertical-align:-2px;flex-shrink:0}
svg{display:block}

/* ---------- Splash ---------- */
#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:22px;
  background:radial-gradient(120% 90% at 50% 20%,var(--navy-700),var(--navy-900));
  transition:opacity .5s var(--ease)}
#splash.out{opacity:0;pointer-events:none}
.splash-logo{width:210px;max-width:62vw;filter:drop-shadow(0 6px 18px rgba(0,0,0,.4))}
.splash-sub{color:var(--gold-soft);letter-spacing:.28em;font-size:13px;font-weight:600}
.spinner{width:26px;height:26px;border-radius:50%;border:2.5px solid rgba(195,165,105,.25);
  border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Staff gate ---------- */
#gate{position:fixed;inset:0;z-index:90;background:radial-gradient(120% 80% at 50% 0%,var(--navy-800),var(--navy-900));
  display:flex;flex-direction:column;padding:calc(var(--safe-t) + 9vh) 24px 24px;color:#fff;overflow:auto}
#gate .g-logo{width:150px;margin:0 auto 6px;display:block}
#gate h1{font-size:19px;font-weight:700;text-align:center;margin:10px 0 3px;color:#fff}
#gate p{text-align:center;color:var(--gold-soft);font-size:13px;margin:0 0 34px}
.g-label{font-size:11px;letter-spacing:.14em;color:var(--gold-soft);font-weight:700;margin:0 0 14px 2px}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.staff-btn{background:rgba(255,255,255,.05);border:1px solid rgba(195,165,105,.25);
  border-radius:18px;padding:24px 14px;color:#fff;display:flex;flex-direction:column;
  align-items:center;gap:11px;transition:.2s var(--ease);font-weight:600}
.staff-btn:active{transform:scale(.96);background:rgba(195,165,105,.14)}
.staff-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;background:var(--gold);color:var(--navy-900)}
.staff-role{font-size:11px;color:var(--gold-soft);font-weight:500}
.gate-select{width:100%;padding:17px 16px;border-radius:14px;background:rgba(255,255,255,.06);
  border:1px solid rgba(195,165,105,.3);color:#fff;font-size:16px;font-weight:600;appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23c3a569' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 15px center}
.gate-select option{color:#111;background:#fff}

/* ---------- App shell ---------- */
#app{display:none;flex-direction:column;min-height:100%}
#app.on{display:flex}
header#top{position:sticky;top:0;z-index:40;height:calc(var(--header-h) + var(--safe-t));
  padding-top:var(--safe-t);background:var(--navy-900);
  display:flex;align-items:center;gap:10px;padding-left:18px;padding-right:14px;color:#fff}
#top .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14.5px;letter-spacing:.02em}
#top .dot{width:8px;height:8px;border-radius:50%;background:var(--red-dot)}
#top .spacer{flex:1}
#top .me{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--gold-soft)}
#top .me .av{width:25px;height:25px;border-radius:50%;background:var(--gold);
  color:var(--navy-900);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}

/* notification banner (線のみ・控えめ) */
#notice{margin:18px 20px 0;padding:13px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  display:flex;gap:11px;align-items:center;font-size:13px;color:var(--ink-2)}
#notice .n-tx{flex:1;line-height:1.35}
#notice .n-tx b{color:var(--ink)}
#notice .n-x{margin-left:auto;color:var(--ink-3);display:flex;padding:6px;border-radius:50%;transition:.15s var(--ease)}
#notice .n-x:active{background:rgba(128,128,128,.14)}

main{flex:1;max-width:560px;width:100%;margin:0 auto;padding:0 20px calc(var(--tab-h) + var(--safe-b) + 24px)}
.screen{display:none;animation:fade .3s var(--ease)}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- 余白の骨格: セクション間は要素内の約3倍 ---- */
.sec{margin-top:42px}
.sec.first{margin-top:26px}
.sec-label{font-size:12px;font-weight:700;color:var(--ink-3);letter-spacing:.08em;margin:0 0 14px;
  display:flex;align-items:center;gap:7px}

/* ---- ヒーロー(唯一の強調要素) ---- */
.hero{background:linear-gradient(155deg,var(--navy-700),var(--navy-900));border-radius:20px;
  padding:28px 24px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:18px;
  position:relative;overflow:hidden}
.hero:before{content:"";position:absolute;right:-60px;top:-60px;width:210px;height:210px;border-radius:50%;
  background:radial-gradient(circle,rgba(195,165,105,.18),transparent 70%)}
.hero .h-hi{font-size:12.5px;color:var(--gold-soft);font-weight:600}
.hero .h-name{font-size:17px;font-weight:700;margin-top:3px}
.hero .h-slot{font-size:12px;color:#a9b7c9;margin-top:11px;display:flex;align-items:center;gap:6px}
.hero .h-num{font-size:54px;font-weight:800;line-height:1;text-align:right;z-index:1;white-space:nowrap}
.hero .h-num small{font-size:20px;font-weight:700;color:var(--gold-soft);margin-left:2px}
.hero .h-num .h-cap{display:block;font-size:11px;font-weight:600;color:var(--gold-soft);letter-spacing:.06em;margin-top:5px}

/* ---- 時間帯チップ ---- */
.slot-row{display:flex;gap:8px;overflow-x:auto;margin-top:2px;-webkit-overflow-scrolling:touch}
.slot-row::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:8px 15px;border-radius:20px;font-size:13px;font-weight:600;color:var(--ink-2);
  border:1px solid var(--line);background:transparent;transition:.2s var(--ease);display:flex;align-items:center;gap:5px}
.chip.on{background:var(--navy-900);color:#fff;border-color:var(--navy-900)}
.chip .cnt{opacity:.6;font-size:11px}

/* ---- 状態: 数字は色/面積を持たず"点"として使う ---- */
.stat-row{display:flex}
.stat-row + .stat-row{margin-top:18px}
.stat{flex:1;text-align:center;padding:6px 4px;transition:.15s var(--ease)}
.stat:active{opacity:.5}
.stat .s-num{font-size:36px;font-weight:800;line-height:1}
.stat .s-num.zero{color:var(--ink-3);font-weight:700}
.stat .s-lbl{font-size:11.5px;color:var(--ink-3);margin-top:8px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px}
.stat + .stat{border-left:1px solid var(--line)}
.dot{width:6px;height:6px;border-radius:50%;flex:0 0 auto;display:inline-block}
.allclear{padding:22px;text-align:center;color:var(--green);font-weight:700;font-size:16px;
  border:1px solid var(--line);border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px}

/* ---- リスト共通(シャドウ廃止・余白区切り) ---- */
.list > *{border-bottom:1px solid var(--line)}
.list > *:last-child{border-bottom:none}

/* task rows */
.task{display:flex;align-items:flex-start;gap:14px;padding:18px 0}
.task .tk-ring{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--ink-3);flex:0 0 auto;margin-top:1px;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:.2s var(--ease)}
.task.done .tk-ring{background:var(--navy-900);border-color:var(--navy-900)}
.task .tk-main{flex:1;min-width:0}
.task .tk-t{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px}
.task.done .tk-t{color:var(--ink-3);text-decoration:line-through;font-weight:500}
.task .tk-sub{font-size:12px;color:var(--ink-3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tk-sub .who{color:var(--gold);font-weight:700}
.tk-sub .done-by{color:var(--green);font-weight:700;display:flex;align-items:center;gap:3px}
.tk-sub .photo{display:flex;align-items:center;gap:3px}
@media (prefers-color-scheme: dark){
  .task.done .tk-ring{background:var(--gold);border-color:var(--gold);color:var(--navy-900)}
  .tk-sub .who{color:var(--gold-soft)}
}

/* accordion (仕込み) */
.acc{padding-left:38px}
.acc .task{padding:11px 0}
.acc .tk-ring{width:20px;height:20px}
.acc .tk-t{font-size:14px;font-weight:500}

/* stock */
.loc-head{display:flex;align-items:center;gap:8px;padding:26px 0 8px;font-weight:700;font-size:13px;color:var(--ink-2)}
.loc-head:first-child{padding-top:6px}
.item{display:flex;align-items:center;gap:12px;padding:15px 0}
.item .it-main{flex:1;min-width:0}
.item .it-n{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item .it-sub{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.item.changed .it-n:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);flex:0 0 auto}

/* stepper (円形・最小) */
.stepper{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.stepper button{width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid var(--ink-3);
  font-size:18px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:.15s var(--ease)}
.stepper button:active{background:var(--navy-900);color:#fff;border-color:var(--navy-900)}
.stepper input{width:40px;text-align:center;border:none;background:transparent;font-size:17px;font-weight:700;
  color:var(--ink);-moz-appearance:textfield}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* pills (テキストのみ・面で塗らない) */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700}
.pill .dot{width:6px;height:6px}
.pill.red{color:var(--red)} .pill.org{color:var(--orange)} .pill.grn{color:var(--green)}
.pill.gld{color:var(--gold)} .pill.gray{color:var(--ink-3)} .pill.blue{color:var(--blue)}
@media (prefers-color-scheme: dark){ .pill.gld{color:var(--gold-soft)} }

/* order */
.sup-head{display:flex;align-items:center;gap:9px;padding:26px 0 4px}
.sup-head:first-child{padding-top:4px}
.sup-head .sh-n{font-weight:700;font-size:14.5px;flex:1;display:flex;align-items:center;gap:7px}
.order{padding:14px 0;border-bottom:1px solid var(--line)}
.order .o-top{display:flex;align-items:center;gap:10px}
.order .o-n{font-weight:600;font-size:14.5px;flex:1;display:flex;align-items:center;gap:8px}
.order .o-qty{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3)}
.incoming{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--line)}
.incoming .in-n{flex:1;font-weight:600;font-size:14.5px}

/* buttons */
.btn{border-radius:13px;padding:14px 16px;font-weight:700;font-size:14px;display:inline-flex;
  align-items:center;justify-content:center;gap:7px;transition:.15s var(--ease)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--navy-900);color:#fff}
.btn.ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
.btn.sm{padding:9px 14px;font-size:13px;border-radius:11px}
.btn.full{width:100%}
.btn.mt{margin-top:20px}
.btn[disabled]{opacity:.4;pointer-events:none}
@media (prefers-color-scheme: dark){ .btn.primary{background:var(--gold);color:var(--navy-900)} }

/* people (定着エンジン) */
.kpi-hero{background:linear-gradient(155deg,#122a49,var(--navy-900));border-radius:20px;
  padding:26px;color:#fff;text-align:center;position:relative;overflow:hidden}
.kpi-hero .kh-l{font-size:12px;color:var(--gold-soft);font-weight:600;letter-spacing:.08em}
.kpi-hero .kh-n{font-size:56px;font-weight:800;line-height:1;margin:8px 0 4px}
.kpi-hero .kh-n small{font-size:22px;font-weight:700;color:var(--gold-soft)}
.kpi-hero .kh-trend{font-size:12.5px;color:#a9b7c9}
.kpi-hero .kh-bar{height:7px;background:rgba(255,255,255,.14);border-radius:5px;margin-top:16px;overflow:hidden}
.kpi-hero .kh-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-soft),var(--gold));border-radius:5px;transition:width .9s var(--ease)}
.person{display:flex;align-items:center;gap:13px;padding:15px 0}
.person .p-av{width:40px;height:40px;border-radius:50%;background:var(--card-2);color:var(--ink-2);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 auto}
.person .p-main{flex:1;min-width:0}
.person .p-n{font-weight:600;font-size:14.5px}
.person .p-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.person .p-rate{text-align:right}
.person .p-rate b{font-size:18px;font-weight:800}
.person .p-rate .pr-l{font-size:10px;color:var(--ink-3)}
.mini-bar{height:5px;background:var(--line);border-radius:4px;margin-top:7px;overflow:hidden;width:100%}
.mini-bar i{display:block;height:100%;border-radius:4px}
.esc{display:flex;gap:11px;align-items:flex-start;padding:16px 0 2px;margin-top:6px;border-top:1px solid var(--line);
  font-size:12.5px;color:var(--ink-2);line-height:1.5}
.esc .ic{color:var(--orange);margin-top:1px}
.esc b{color:var(--orange)}

/* submit bar */
#submitBar{position:fixed;left:0;right:0;bottom:calc(var(--tab-h) + var(--safe-b));z-index:35;
  padding:12px 16px;background:linear-gradient(180deg,transparent,var(--bg) 34%);transition:.3s var(--ease);transform:translateY(130%)}
#submitBar.on{transform:none}
#submitBar .sb-inner{background:var(--navy-900);color:#fff;border-radius:15px;padding:13px 16px;
  display:flex;align-items:center;gap:12px;max-width:560px;margin:0 auto}
#submitBar .sb-tx{flex:1;font-size:13px}
#submitBar .sb-tx b{color:var(--gold-soft)}
#submitBar button{background:var(--gold);color:var(--navy-900);border-radius:11px;padding:10px 16px;font-weight:800;font-size:14px}

/* tab bar */
nav#tabs{position:fixed;left:0;right:0;bottom:0;z-index:38;height:calc(var(--tab-h) + var(--safe-b));
  padding-bottom:var(--safe-b);background:var(--bg);border-top:1px solid var(--line);display:flex}
nav#tabs button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--ink-3);font-size:10px;font-weight:600;position:relative;transition:.15s var(--ease)}
nav#tabs button.on{color:var(--ink)}
nav#tabs button .badge{position:absolute;top:6px;left:calc(50% + 7px);min-width:16px;height:16px;padding:0 4px;
  background:var(--red);color:#fff;border-radius:9px;font-size:9.5px;font-weight:800;display:flex;
  align-items:center;justify-content:center}

/* modal */
.modal{position:fixed;inset:0;z-index:70;background:rgba(6,12,22,.5);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex;animation:fade .2s var(--ease)}
.sheet{background:var(--card);width:100%;max-width:560px;border-radius:24px 24px 0 0;
  padding:24px 22px calc(26px + var(--safe-b));animation:up .32s var(--ease)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{margin:0 0 5px;font-size:19px;font-weight:800;display:flex;align-items:center;gap:9px}
.sheet .s-sub{color:var(--ink-3);font-size:13px;margin:0 0 20px}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.sheet-item .si-main{flex:1;min-width:0}
.sheet-item .si-n{font-weight:600;font-size:14.5px}
.sheet-item .si-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.opt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.opt{padding:14px;border:1.5px solid var(--line);border-radius:13px;text-align:center;font-weight:600;font-size:14px;transition:.15s var(--ease)}
.opt.on{border-color:var(--gold);background:rgba(195,165,105,.1)}
.field{margin-bottom:18px}
.field label{font-size:12px;font-weight:700;color:var(--ink-3);display:block;margin-bottom:8px}
.field input,.field select{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:13px;
  background:var(--card-2);color:var(--ink)}
.big-num{display:flex;align-items:center;justify-content:center;gap:22px}
.big-num button{width:54px;height:54px;border-radius:50%;background:transparent;border:1.5px solid var(--ink-3);
  font-size:26px;font-weight:600;color:var(--ink-2)}
.big-num button:active{background:var(--navy-900);color:#fff;border-color:var(--navy-900)}
.big-num .bn-v{font-size:42px;font-weight:800;min-width:80px;text-align:center}
.calc-line{background:var(--card-2);border-radius:13px;padding:13px 14px;font-size:13.5px;text-align:center;
  color:var(--ink-2);margin-bottom:18px}
.calc-line b{color:var(--ink);font-size:17px}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(var(--tab-h) + var(--safe-b) + 18px);transform:translateX(-50%) translateY(30px);
  z-index:80;background:var(--navy-900);color:#fff;padding:13px 18px;border-radius:14px;font-size:14px;font-weight:600;
  opacity:0;transition:.3s var(--ease);display:flex;align-items:center;gap:12px;max-width:90vw;
  box-shadow:0 10px 40px rgba(0,0,0,.35)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .t-undo{color:var(--gold-soft);font-weight:800;padding:2px 4px}

.foot{text-align:center;color:var(--ink-3);font-size:11px;margin-top:40px}
</style>
</head>
<body>

<!-- ===== Splash ===== -->
<div id="splash">

/* ---- 派生ステータス（v2.1の自動判定ロジック） ---- */
function expStatus(it){
  if(!it.expf) return null;
  if(!it.exp) return 'none';
  const d = new Date(it.exp+'T00:00:00');
  const diff = Math.round((d - TODAY)/86400000);
  if(diff < 0) return 'over';
  if(diff <= 2) return 'near';
  return 'ok';
}
function stockStatus(it){
  if(it.stock <= 0) return 'out';
  if(it.stock <= it.op) return 'low';
  return 'ok';
}

/* =====================================================================
   API（モック）— 本番は fetch(GAS_URL+'?action=items') 等に差し替え
   ===================================================================== */
const wait = (v,ms=180)=>new Promise(r=>setTimeout(()=>r(v),ms));
const API = {
  items:      ()=>wait(ITEMS),
  checks:     ()=>wait(CHECKS),
  orders:     ()=>wait(ORDERS),
  team:       ()=>wait({staff:STAFF, checks:CHECKS, rate:WEEK_RATE}),
  saveStock:  (diffs)=>{ diffs.forEach(d=>{const it=ITEMS.find(x=>x.id===d.id); if(it){it.stock=d.stock; if(d.exp!==undefined)it.exp=d.exp;}}); store.write('items',ITEMS); return wait({ok:true,n:diffs.length}); },
  saveCheck:  (id,by)=>{ const c=CHECKS.find(x=>x.id===id); if(c){c.done=!c.done; c.by=c.done?by:null; c.at=c.done?nowHM():null;} store.write('checks',CHECKS); return wait({ok:true}); },
  waste:      (id,qty)=>{ const it=ITEMS.find(x=>x.id===id); if(it){it.stock=Math.max(0,it.stock-qty); if(it.stock===0)it.exp=null;} store.write('items',ITEMS); return wait({ok:true}); },
  orderStatus:(oid,status)=>{ const o=ORDERS.find(x=>x.oid===oid); if(o)o.status=status; store.write('orders',ORDERS); return wait({ok:true}); },
  placeOrder: (itemId,qty)=>{ const it=ITEMS.find(x=>x.id===itemId); const oid='o-'+Math.floor(performance.now()); ORDERS.push({oid,itemId,name:it.n,sup:it.sup,via:it.via,qty,status:'発注済',date:fmtD(TODAY)}); store.write('orders',ORDERS); return wait({ok:true,oid}); },
  receive:    (oid,recv)=>{ const o=ORDERS.find(x=>x.oid===oid); if(o){o.status='入荷済'; const it=ITEMS.find(x=>x.id===o.itemId); if(it)it.stock+=recv;} store.write('orders',ORDERS); store.write('items',ITEMS); return wait({ok:true}); },
};
function nowHM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

  setTimeout(()=>{
    document.getElementById('splash').classList.add('out');
    const saved = store.read('me',null);
    if(saved){ pickStaff(saved,true); }
    else { document.getElementById('gate').classList.remove('hidden'); }
  }, 1100);
});

function renderGate(){
  document.getElementById('staffSelect').innerHTML =
    '<option value="" disabled selected>選択してください</option>' +
    STAFF.map(s=>`<option value="${s.id}">${s.name}（${s.role}）</option>`).join('');
}
function startFromGate(){ const id=document.getElementById('staffSelect').value; if(!id)return; pickStaff(id); }

function pickStaff(id, silent){
  State.me = STAFF.find(s=>s.id===id);
  store.write('me', id);
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('on');
  document.getElementById('meName').textContent = State.me.name;
  document.getElementById('meAv').textContent = State.me.name[0];
  document.getElementById('heroName').textContent = State.me.name;
  document.getElementById('serveLabel').innerHTML = ic('beer',15)+' 本日の提供可能数';
  State.slot = currentSlot();
  boot();
  if(!silent) toast(State.me.name+'さん、よろしくお願いします');
}

  else if(slot==='閉店') msg=`<b>締め前チェック</b>の時間です。期限切れ確認とレジ締めを`;

function taskRow(c){

  const sub = c.done

    <div class="acc list" id="acc-${c.id}" style="display:none">
      ${PREP10.map(p=>`<div class="task"><span class="tk-ring" onclick="togglePrep(this)"></span><span class="tk-t">${p}</span></div>`).join('')}
    </div>`:'';
  const tail = c.accordion? ic('chevron',13) : c.link? ic('arrow',14) : '';

function wq(d){ wasteCtx.qty=Math.max(0,wasteCtx.qty+d); document.getElementById('wqv').textContent=wasteCtx.qty; }
function wreason(el,r){ document.querySelectorAll('#wreason .opt').forEach(o=>o.classList.remove('on')); el.classList.add('on'); wasteCtx.reason=r; }

/* =====================================================================
   棚卸
   ===================================================================== */
const Stock = {
  mode:'daily',
  edits:{},
  daily:['i03','i04','i05','i06','i07','i08','i10','i11','i13','i14'],
  setMode(m){ this.mode=m; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===m)); this.render(); },
  list(){ const ids=this.mode==='daily'?this.daily:ITEMS.map(i=>i.id); return ITEMS.filter(i=>ids.includes(i.id)); },
  dirty(){ return Object.keys(this.edits).length; },
  render(){
    const byLoc={}; this.list().forEach(i=>{(byLoc[i.loc]=byLoc[i.loc]||[]).push(i)});
    let html='';
    LOC_ORDER.forEach(loc=>{ if(!byLoc[loc])return;
      html+=`<div class="loc-head">${ic(LOC_ICON[loc],15)} ${loc}</div><div class="list">`;
      byLoc[loc].forEach(i=>{ html+=this.row(i); });
      html+=`</div>`;
    });
    document.getElementById('stockList').innerHTML=html;
    this.syncBar();
  },
  row(i){
    const changed=this.edits[i.id]!==undefined;
    const val=changed?this.edits[i.id].stock:i.stock;
    const es=expStatus(i);
    const badge = es==='over'?`<span class="pill red"><span class="dot" style="background:var(--red)"></span>期限切れ</span>`
      :es==='near'?`<span class="pill org"><span class="dot" style="background:var(--orange)"></span>間近</span>`
      :es==='none'?`<span class="pill gray">期限未入力</span>`:'';
    const ss=stockStatus(i);
    const sbadge = ss==='out'?`<span class="pill red"><span class="dot" style="background:var(--red)"></span>欠品</span>`
      :ss==='low'?`<span class="pill org"><span class="dot" style="background:var(--orange)"></span>要発注</span>`:'';
    return `<div class="item ${changed?'changed':''}" id="row-${i.id}">
      <div class="it-main"><div class="it-n">${i.n} ${badge}${sbadge}</div>
        <div class="it-sub">発注点 ${i.op}${i.u}${i.exp?' ・ 期限 '+i.exp:''}</div></div>
      <div class="stepper">
        <button onclick="Stock.adj('${i.id}',-1)">−</button>
        <input value="${val}" inputmode="numeric" onchange="Stock.set('${i.id}',this.value)">
        <button onclick="Stock.adj('${i.id}',1)">＋</button>
      </div></div>`;
  },
  adj(id,d){ const i=ITEMS.find(x=>x.id===id); const cur=this.edits[id]?this.edits[id].stock:i.stock;
    this.set(id, Math.max(0,cur+d)); },
  set(id,v){ const i=ITEMS.find(x=>x.id===id); v=Math.max(0,+v||0);
    if(v===i.stock){ delete this.edits[id]; } else { this.edits[id]={stock:v, exp:i.exp}; }
    this.render();
  },
  syncBar(){ const n=this.dirty(); document.getElementById('sbCount').textContent=n;
    document.getElementById('submitBar').classList.toggle('on', n>0 && document.getElementById('sc-stock').classList.contains('on')); },
  async save(){
    const diffs=Object.entries(this.edits).map(([id,v])=>({id,stock:v.stock,exp:v.exp}));
    if(!diffs.length)return;
    const needExp=diffs.map(d=>ITEMS.find(i=>i.id===d.id)).filter(i=>i.expf && (!i.exp || expStatus(i)==='none'));
    const doSave=async()=>{ await API.saveStock(diffs); const n=diffs.length; this.edits={}; this.render(); renderToday(); refreshBadges(); toast(`${n}品の棚卸しを保存`); };
    if(needExp.length){ this.promptExp(needExp,0,doSave); } else doSave();
  },
  promptExp(items,idx,done){
    if(idx>=items.length){ done(); return; }
    const it=items[idx];
    openSheet(`
      <h3>賞味期限の入力</h3><p class="s-sub">${it.n}（残り ${items.length-idx}品）</p>
      <div class="field"><label>期限</label><input type="date" id="expIn" value="${it.exp||''}"></div>
      <button class="btn primary full" onclick="Stock._expNext()">次へ</button>
      <button class="btn ghost full mt" onclick="Stock._expSkip()">未入力のまま</button>
    `);
    this._expState={items,idx,done};
  },
  _expNext(){ const {items,idx,done}=this._expState; const v=document.getElementById('expIn').value;
    if(v){ this.edits[items[idx].id].exp=v; } closeSheet(); this.promptExp(items,idx+1,done); },
  _expSkip(){ const {items,idx,done}=this._expState; closeSheet(); this.promptExp(items,idx+1,done); },
};

function renderOrders(){
  const need=ITEMS.filter(i=>['out','low'].includes(stockStatus(i)));
  const bySup={}; need.forEach(i=>{(bySup[i.sup]=bySup[i.sup]||[]).push(i)});
  const zone=document.getElementById('orderList');
  if(!need.length){ zone.innerHTML=`<div class="allclear">${ic('check',18,2.2)} 発注が必要な品はありません</div>`; }
  else{
    zone.innerHTML=Object.entries(bySup).map(([sup,items])=>{
      const via=items[0].via;
      return `<div class="sup-head"><span class="sh-n">${ic('shop',16)} ${sup}</span><span class="pill blue">${VIA_LABEL[via]}</span></div>
        <div class="list">${items.map(i=>orderRow(i)).join('')}</div>
        ${orderBtn(sup,via)}`;
    }).join('');
  }
  const inc=ORDERS.filter(o=>o.status==='発注済');
  document.getElementById('incomingList').innerHTML = inc.length? `<div class="list">`+inc.map(o=>`
    <div class="incoming">
      <div class="in-n">${o.name}<div class="it-sub" style="margin-top:3px"><span class="pill gld">発注済 ${o.date}</span></div></div>
      <button class="btn primary sm" onclick="receiveFlow('${o.oid}')">${ic('package',15)} 入荷</button>
    </div>`).join('')+`</div>` : `<p class="foot">入荷待ちはありません</p>`;
}
function orderRow(i){
  const ss=stockStatus(i);
  const q = store.read('oq',{})[i.id] ?? i.std;
  const dot = ss==='out'?'var(--red)':'var(--orange)';
  return `<div class="order"><div class="o-top">
    <div class="o-n"><span class="dot" style="background:${dot}"></span>${i.n}</div>
    <div class="o-qty"><span>在庫${i.stock}</span>
      <div class="stepper"><button onclick="oq('${i.id}',-1)">−</button>
      <input id="oq-${i.id}" value="${q}" inputmode="numeric" style="width:36px" onchange="oqSet('${i.id}',this.value)">
      <button onclick="oq('${i.id}',1)">＋</button></div></div>
  </div></div>`;
}
function oq(id,d){ const el=document.getElementById('oq-'+id); el.value=Math.max(0,(+el.value||0)+d); oqSet(id,el.value); }
function oqSet(id,v){ const o=store.read('oq',{}); o[id]=Math.max(0,+v||0); store.write('oq',o); }
function orderBtn(sup,via){
  const label=via==='line'?'LINEで発注':via==='mail'?'発注書メールを送信':'電話する';
  return `<button class="btn primary full mt" style="margin-top:14px" onclick="placeOrders('${sup}')">${ic(VIA_ICON[via],15)} ${label}</button>`;
}
async function placeOrders(sup){
  const items=ITEMS.filter(i=>i.sup===sup && ['out','low'].includes(stockStatus(i)));
  const oqs=store.read('oq',{});
  const via=items[0].via;
  const text = `【よいどころ千福 発注】${fmtD(TODAY)}\n`+items.map(i=>`・${i.n} × ${oqs[i.id]??i.std}${i.u}`).join('\n');
  if(via==='line' && navigator.share){ try{ await navigator.share({text}); }catch(e){} }
  else if(via==='mail'){ location.href=`mailto:?subject=発注（よいどころ千福）&body=${encodeURIComponent(text)}`; }
  for(const i of items){ await API.placeOrder(i.id, oqs[i.id]??i.std); }
  renderOrders(); renderToday(); refreshBadges();
  toast(`${sup} に${items.length}品を発注`);
}
let recvCtx=null;
function receiveFlow(oid){
  const o=ORDERS.find(x=>x.oid===oid); const it=ITEMS.find(x=>x.id===o.itemId)||{stock:0,u:'',n:o.name};
  recvCtx={oid, recv:o.qty, base:it.stock};
  openSheet(`
    <h3>入荷の記録</h3><p class="s-sub">${o.name}</p>
    <div class="field"><label>入荷数</label>
      <div class="big-num"><button onclick="rq(-1)">−</button><div class="bn-v" id="rqv">${o.qty}</div><button onclick="rq(1)">＋</button></div></div>
    <div class="calc-line">入荷後の在庫 = 既存 ${it.stock} ＋ 入荷 <span id="rqEcho">${o.qty}</span> → <b id="rqSum">${it.stock+o.qty}</b> ${it.u}</div>
    <div class="field"><label>賞味期限（早い方を残す）</label><input type="date" id="recvExp"></div>
    <button class="btn primary full" onclick="receiveConfirm()">入荷を確定</button>
    <button class="btn ghost full mt" onclick="closeSheet()">キャンセル</button>
  `);
}
function rq(d){ recvCtx.recv=Math.max(0,recvCtx.recv+d); document.getElementById('rqv').textContent=recvCtx.recv;
  document.getElementById('rqEcho').textContent=recvCtx.recv; document.getElementById('rqSum').textContent=recvCtx.base+recvCtx.recv; }
async function receiveConfirm(){
  await API.receive(recvCtx.oid, recvCtx.recv);
  const exp=document.getElementById('recvExp').value;
  const o=ORDERS.find(x=>x.oid===recvCtx.oid); const it=ITEMS.find(x=>x.id===o.itemId);
  if(it && exp){ if(!it.exp || exp<it.exp) it.exp=exp; store.write('items',ITEMS); }
  closeSheet(); renderOrders(); renderToday(); refreshBadges(); toast('入荷を記録しました');
}

      return `<div class="task"><span class="tk-ring" style="border-color:var(--orange)"></span>
        <div class="tk-main"><div class="tk-t">${c.t}</div>
        <div class="tk-sub"><span class="pill org">${c.slot}</span>担当 ${who}</div></div></div>`;
    }).join('')+`</div>`
      + `<div class="esc">${ic('warn',17)}<div><b>17:00 までに未完了なら</b>、代表（浅見さん）へ自動でお知らせが届きます。毎日見張らなくても、抜けは自動で拾われます。</div></div>`;
  }
}

/* =====================================================================
   バッジ / 汎用UI
   ===================================================================== */
function refreshBadges(){
  const need=ITEMS.filter(i=>['out','low'].includes(stockStatus(i))).length;
  const b=document.getElementById('badgeOrder');
  b.textContent=need; b.classList.toggle('hidden', need===0);
}
function openSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('modal').classList.add('on'); }
function closeSheet(){ document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal')closeSheet(); });
document.getElementById('meBtn').addEventListener('click',()=>{
  openSheet(`<h3>スタッフ切替</h3><p class="s-sub">今の担当者を選んでください</p>
    <div class="opt-row">
    ${STAFF.map(s=>`<div class="opt ${s.id===State.me.id?'on':''}" onclick="switchStaff('${s.id}')">${s.name}<div class="muted" style="font-size:11px">${s.role}</div></div>`).join('')}</div>
    <button class="btn ghost full" onclick="closeSheet()">閉じる</button>
    <button class="btn full" style="background:transparent;color:var(--ink-3);margin-top:10px;font-size:12.5px" onclick="resetDemo()">デモを最初から（データを初期化）</button>`);
});
function switchStaff(id){ closeSheet(); pickStaff(id); Nav.go('today'); }
function resetDemo(){ if(confirm('デモのデータを最初の状態に戻します。よろしいですか？')){ Object.keys(localStorage).filter(k=>k.startsWith('senpuku_')).forEach(k=>localStorage.removeItem(k)); location.reload(); } }

let toastT=null;
function toast(msg,extra=''){ const el=document.getElementById('toast');
  el.innerHTML=`<span>${msg} ${extra}</span>`; el.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),2200); }
function toastUndo(msg,undo){ const el=document.getElementById('toast');
  el.innerHTML=`<span>${msg}</span><span class="t-undo" id="undoBtn">取り消す</span>`; el.classList.add('on');
  document.getElementById('undoBtn').onclick=()=>{ clearTimeout(toastT); el.classList.remove('on'); undo(); };
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),5000); }

window.addEventListener('DOMContentLoaded',()=>{
  const f=document.createElement('div'); f.className='foot';
  f.innerHTML='よいどころ千福 ワークアプリ ・ デモ版';
  document.querySelector('#sc-people').appendChild(f);
});
